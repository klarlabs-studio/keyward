apiVersion: v1
kind: Service
metadata:
  name: proctor-sync-server
  namespace: proctor
  labels:
    app.kubernetes.io/name: proctor-sync-server
    app.kubernetes.io/part-of: proctor
spec:
  type: ClusterIP
  # Explicit (see the note in deployment.yaml): the kustomize label transformer
  # no longer writes into selectors.
  selector:
    app.kubernetes.io/name: proctor-sync-server
    app.kubernetes.io/part-of: proctor
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
