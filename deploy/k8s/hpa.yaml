# Horizontal autoscaling for the stateless API. Safe now that state lives in
# Postgres (no per-pod volume). Scales on CPU; add custom metrics later if needed.
#
# PREREQUISITE: metrics-server must be installed in the cluster. Without it this
# HPA is inert — it reports `cpu: <unknown>/70%` and emits FailedGetResourceMetric
# ("unable to fetch metrics from resource metrics API"), so the app never scales
# and the failure is silent unless you look at the HPA. Most managed clusters
# (GKE/EKS/AKS) ship metrics-server; a bare cluster does not. Verify with:
#   kubectl top pods -n proctor
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: proctor-sync-server
  namespace: proctor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: proctor-sync-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
