apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply the whole set with:  kubectl apply -k deploy/k8s
# (or apply the files individually with kubectl apply -f deploy/k8s/).
namespace: keyward

resources:
  - namespace.yaml
  - postgres.yaml
  # --- sync API tier -------------------------------------------------------
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  # --- web vault tier (the built SPA, served by nginx) ---------------------
  # Its own Deployment/Service/Ingress rather than extra paths on the API's,
  # because it is served from a SEPARATE HOSTNAME on purpose. See the rationale
  # at the top of web-ingress.yaml and deploy/README.md § "Which origin serves
  # the vault". There is no web HPA by design (static files never hit a CPU
  # target; an HPA that can never trigger is just a misleading object).
  - web-deployment.yaml
  - web-service.yaml
  - web-ingress.yaml
  - web-pdb.yaml
  # --- shared --------------------------------------------------------------
  - networkpolicy.yaml
# NOTE: no Secret manifest is committed — create the `keyward-sync-secrets`
# Secret out-of-band with `kubectl create secret` (see deploy/README.md § Secrets).

# `labels` with includeSelectors:false — deliberately NOT the older
# `commonLabels`, which injects its pairs into SELECTORS as well as metadata.
# That behaviour is actively harmful here for two reasons:
#
#   1. It broke ACME TLS issuance. commonLabels rewrote the
#      allow-ingress-to-acme-solver policy's podSelector to also require
#      `app.kubernetes.io/part-of: keyward`. cert-manager's HTTP-01 solver pods
#      are created by cert-manager and carry only their own
#      `acme.cert-manager.io/*` labels, so the policy matched nothing, stayed
#      inert, and the challenge failed with a 502 (observed on a live cluster).
#
#   2. It bakes the label into Deployment/StatefulSet `spec.selector`, which is
#      IMMUTABLE. Once shipped, removing or changing the label can only be done
#      by deleting and recreating the workload.
#
# Every workload and Service here already declares its own precise selector via
# `app.kubernetes.io/name`, so the part-of label is purely organisational and
# has no business in a selector.
labels:
  - pairs:
      app.kubernetes.io/part-of: keyward
    includeSelectors: false

# Override the image tag without editing deployment.yaml, e.g.:
#   kubectl kustomize deploy/k8s | kubectl apply -f -
# or set here:
images:
  - name: ghcr.io/klarlabs-studio/keyward-sync-server
    newTag: "2.1.0"
  # The web image is versioned from the SAME git tag as the server (both are
  # built by .github/workflows/release.yml on a v* tag, which refuses to publish
  # unless the tag, Cargo.toml and app/package.json all agree). Keep these two
  # newTag values in step: a web bundle and a relay from different releases are
  # not a combination anything tests.
  - name: ghcr.io/klarlabs-studio/keyward-web
    newTag: "2.1.0"
