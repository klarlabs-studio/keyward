apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: proctor-sync-data
  namespace: proctor
  labels:
    app.kubernetes.io/name: proctor-sync-server
    app.kubernetes.io/part-of: proctor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Sealed-vault blobs are small (ciphertext only). Grow as your fleet grows.
      storage: 1Gi
  # Leave storageClassName unset to use the cluster default class. Pin it to a
  # backed-up, durable class in production, e.g.:
  # storageClassName: standard-rwo
