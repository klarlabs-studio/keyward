# Local run of the SCALABLE (Postgres-backed) sync server — the managed-cloud
# backend. Unlike the file-backed self-host path, this backs the API with a shared
# database so it can run stateless behind a load balancer (many replicas, one DB).
#
#   cp deploy/.env.example deploy/.env   # then edit it — there is no default
#   docker compose --env-file deploy/.env -f deploy/docker-compose.pg.yml up --build
#
# The database password has no fallback value on purpose. A working default in a
# public repository is the one that ends up in production: it reads as
# configuration rather than as a placeholder, and nothing fails to remind you.
#
# In production the database is a managed instance (Cloud SQL / RDS / a Postgres
# operator) and the server runs from deploy/k8s with KEYWARD_SYNC_PG set from a
# Secret. Zero-knowledge is unchanged: Postgres only ever holds ciphertext blobs,
# public keys, and hashed tokens/invite codes.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keyward
      # No default. `docker compose` fails with the message below if it is unset,
      # rather than silently starting with a password that is public knowledge in
      # an open-source repository. See deploy/.env.example.
      POSTGRES_PASSWORD: ${KEYWARD_DB_PASSWORD:?set KEYWARD_DB_PASSWORD (see deploy/.env.example)}
      POSTGRES_DB: keyward
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keyward"]
      interval: 3s
      timeout: 3s
      retries: 10

  sync:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      KEYWARD_SYNC_ADDR: 0.0.0.0:8787
      # The Postgres backend takes precedence over the file store; the server
      # applies the schema on startup.
      KEYWARD_SYNC_PG: postgres://keyward:${KEYWARD_DB_PASSWORD:?set KEYWARD_DB_PASSWORD (see deploy/.env.example)}@db:5432/keyward
      KEYWARD_SYNC_PG_POOL: "8"
      KEYWARD_SYNC_TOKEN_TTL: "2592000"
      KEYWARD_SYNC_RATELIMIT_PER_MIN: "30"
    ports:
      - "8787:8787"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
