# Network hardening for the `keyward` namespace (GA / CONT-001).
#
# Strategy: DEFAULT-DENY INGRESS for the whole namespace, then explicit allows
# for the only flows that must exist:
#   1. ingress-controller  ─▶ app pods    :8787
#   2. Prometheus          ─▶ app pods     :8787 (/metrics scrape)
#   3. app pods            ─▶ Postgres     :5432   (enforced on the Postgres side)
#   4. ingress-controller  ─▶ web pods     :8080  (the static vault SPA)
#
# NOTE THAT THERE IS NO web ─▶ app RULE, and that is not an omission. The web
# pods never call the sync server: the SPA is served to the BROWSER, and the
# browser then talks to the API directly from the user's machine, cross-origin.
# The web tier is not in the API request path at all.
#
# EGRESS IS LEFT PERMISSIVE on purpose. A too-tight egress policy silently breaks
# DNS (kube-dns), cert-manager's ACME calls, and the app's outbound HTTPS to
# Stripe. Locking egress down is tracked as a follow-up; if you add an egress
# policy later you MUST allow, at minimum: DNS to kube-dns (UDP+TCP 53),
# app ─▶ Postgres :5432, and app ─▶ internet :443 (Stripe / ACME).
#
# NOTE: This file only restricts traffic if a NetworkPolicy-enforcing CNI is
# installed (Calico, Cilium, etc.). On a CNI that ignores NetworkPolicy these
# objects are inert but harmless.
#
# KUBELET PROBES: liveness/readiness probes originate from the NODE, not a pod.
# Most CNIs exempt host/kubelet traffic from NetworkPolicy, but a few strict
# configurations do not — if pods start failing their probes after applying this,
# add an allow rule for the node CIDR (ipBlock) on port 8787.
---
# 1) Default-deny all ingress in the namespace. With no `ingress:` rules, every
#    pod selected (podSelector: {} = all pods) rejects all inbound traffic until
#    another policy explicitly allows it. Egress is untouched (policyTypes lists
#    Ingress only), so outbound DNS/Stripe/ACME keep working.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: keyward
  labels:
    app.kubernetes.io/part-of: keyward
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# 2) Allow inbound to the APP pods on TCP 8787 from:
#      (a) the ingress-controller namespace (client HTTPS terminated at nginx),
#      (b) a monitoring namespace (Prometheus scraping /metrics).
#
#    Least privilege: nothing else may reach the app. If you run Prometheus (or
#    any scraper) INSIDE the `keyward` namespace, add a `- podSelector: {}` entry
#    to the `from` list below — note that allows every pod in this namespace.
#
#    PER-CLUSTER ADJUSTMENTS — change these namespaceSelector labels to match
#    where your controllers actually run:
#      * ingress-nginx is commonly installed in the `ingress-nginx` namespace.
#        The `kubernetes.io/metadata.name` label is auto-set by Kubernetes on
#        every namespace (v1.21+), so it is the most portable selector. If your
#        ingress lives elsewhere (e.g. `kube-system`), change the value below.
#      * Prometheus commonly runs in a `monitoring` namespace (kube-prometheus-
#        stack default). Change the value if yours differs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-app
  namespace: keyward
  labels:
    app.kubernetes.io/part-of: keyward
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: keyward-sync-server
  policyTypes:
    - Ingress
  # TWO SEPARATE RULES, not one rule with two `from` entries.
  #
  # Semantically these are equivalent — entries within a single `from` are OR'd,
  # and separate ingress rules are also OR'd. In practice they are not treated
  # identically by every CNI: on k3s (kube-router) a rule whose first `from`
  # entry combines namespaceSelector AND podSelector was observed to admit that
  # first entry while the sibling namespace entry did not take effect, so
  # Prometheus was refused (fast REJECT, not a timeout) even though the manifest
  # plainly allowed it. Splitting them keeps each rule to one shape and is
  # portable.
  #
  # Worth knowing how this hid: the earlier live validation proved that an
  # unauthorized pod was BLOCKED and that the ingress controller was ALLOWED. It
  # never positively tested the monitoring path, so a silently ineffective allow
  # looked exactly like success. A deny-only test cannot tell you an allow works.
  ingress:
    # (a) ingress controller namespace. ADJUST to your cluster.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8787
    # (b) Prometheus / monitoring namespace. ADJUST to your cluster.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8787
---
# 2b) Allow the ingress controller to reach cert-manager's ACME HTTP-01 SOLVER
#     pods on TCP 8089.
#
#     WHY THIS IS REQUIRED (found the hard way on a live cluster): to prove you
#     control the domain, cert-manager creates a short-lived solver Pod +
#     Service + Ingress and Let's Encrypt fetches
#     http://<host>/.well-known/acme-challenge/<token> through them. That solver
#     pod lands in THIS namespace, but it is labelled
#     `acme.cert-manager.io/http01-solver=true` — it does NOT carry
#     `app.kubernetes.io/name: keyward-sync-server`, so rule (2) does not select
#     it and the default-deny in rule (1) drops the traffic.
#
#     The failure is quiet and easy to misread: the Ingress answers, so you get
#     a 502 rather than a timeout, and the Challenge sits in
#     `Waiting for HTTP-01 challenge propagation: wrong status code '502'`
#     forever. TLS never issues and nothing in the app's own logs explains why.
#
#     Ports differ from the app: the solver listens on 8089, not 8787.
#
#     PER-CLUSTER: same adjustment as rule (2) — change the namespaceSelector to
#     wherever your ingress controller actually runs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-acme-solver
  namespace: keyward
  labels:
    app.kubernetes.io/part-of: keyward
spec:
  podSelector:
    matchLabels:
      acme.cert-manager.io/http01-solver: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8089
---
# 2c) Allow inbound to the WEB pods on TCP 8080 from the ingress-controller
#     namespace.
#
#     REQUIRED — without this the vault UI is simply unreachable. Rule (1)
#     default-denies every pod in the namespace, and rule (2) selects only
#     `app.kubernetes.io/name: keyward-sync-server`, so the web pods inherit the
#     deny and match no allow. The symptom is an ingress controller that answers
#     with 502/504 while `kubectl get pods` shows keyward-web perfectly Ready,
#     which is a genuinely confusing place to start debugging.
#
#     Port 8080, NOT 8787 — the nginx-unprivileged image cannot bind a
#     privileged port and listens on 8080 (see web-deployment.yaml).
#
#     Only the ingress controller is allowed. There is deliberately no
#     monitoring rule: this image exposes no Prometheus endpoint, so a scraper
#     would only ever retrieve index.html.
#
#     PER-CLUSTER: same adjustment as rule (2) — change the namespaceSelector to
#     wherever your ingress controller actually runs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-web
  namespace: keyward
  labels:
    app.kubernetes.io/part-of: keyward
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: keyward-web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
---
# 3) Allow inbound to POSTGRES pods on TCP 5432 ONLY from the app pods. Nothing
#    else in (or out of) the namespace may reach the database. Combined with the
#    default-deny above, this is the sole path to Postgres.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-to-postgres
  namespace: keyward
  labels:
    app.kubernetes.io/part-of: keyward
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: keyward-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keyward-sync-server
      ports:
        - protocol: TCP
          port: 5432
