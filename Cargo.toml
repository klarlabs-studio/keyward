[workspace]
resolver = "2"
# `crates/sync-postgres-queries` is GENERATED by Cornucopia from
# crates/sync-postgres/queries/*.sql and committed — see cornucopia.toml. It is
# a workspace member so `cargo check`/`clippy` cover it, and it is edition 2024 /
# rust-version 1.85 while the rest of the workspace is 2021 / 1.90. That
# mismatch is intentional and harmless: cornucopia controls those two fields,
# 1.90 satisfies 1.85, and edition is per-crate.
members = ["crates/crypto", "crates/vault", "crates/broker", "crates/cli", "crates/mcp", "crates/mint", "crates/profiles", "crates/passbook", "crates/passbook-cli", "crates/passbook-wasm", "crates/sync", "crates/sync-postgres", "crates/sync-postgres-queries", "crates/sync-server"]

[workspace.package]
version = "2.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
repository = "https://github.com/klarlabs/keyward"
rust-version = "1.90"

[profile.release]
lto = true
