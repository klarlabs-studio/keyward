# Self-contained in-cluster Postgres for a simple deploy. For PRODUCTION prefer a
# managed database (Cloud SQL / RDS) or an operator (CloudNativePG) that gives you
# backups, HA, and point-in-time recovery — point PROCTOR_SYNC_PG at it and delete
# this file from kustomization.yaml.
apiVersion: v1
kind: Service
metadata:
  name: proctor-postgres
  namespace: proctor
  labels:
    app.kubernetes.io/name: proctor-postgres
    app.kubernetes.io/part-of: proctor
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: proctor-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: proctor-postgres
  namespace: proctor
  labels:
    app.kubernetes.io/name: proctor-postgres
    app.kubernetes.io/part-of: proctor
spec:
  serviceName: proctor-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: proctor-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proctor-postgres
        app.kubernetes.io/part-of: proctor
    spec:
      securityContext:
        # The official image runs as the postgres user; fsGroup lets it own the volume.
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16.4-alpine@sha256:5660c2cbfea50c7a9127d17dc4e48543eedd3d7a41a595a2dfa572471e37e64c
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: proctor
            - name: POSTGRES_DB
              value: proctor
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: proctor-sync-secrets
                  key: postgres-password
            # Keep PGDATA in a subdir so the volume's lost+found never clashes with initdb.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "proctor"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "proctor"]
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
