apiVersion: apps/v1
kind: Deployment
metadata:
  name: proctor-sync-server
  namespace: proctor
  labels:
    app.kubernetes.io/name: proctor-sync-server
    app.kubernetes.io/part-of: proctor
spec:
  # Stateless: all state lives in PostgreSQL, so the API scales horizontally.
  # Start at 2 for availability; the HPA (hpa.yaml) scales on CPU.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  # Both labels are listed EXPLICITLY. They used to be injected by the
  # kustomize `commonLabels` transformer, which also rewrote the ACME solver
  # NetworkPolicy's podSelector and silently broke TLS issuance. That
  # transformer is now `labels` with includeSelectors:false, so anything that
  # belongs in a selector has to be written here — and `spec.selector` is
  # IMMUTABLE, so this list must keep matching the deployed object exactly.
  selector:
    matchLabels:
      app.kubernetes.io/name: proctor-sync-server
      app.kubernetes.io/part-of: proctor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proctor-sync-server
        app.kubernetes.io/part-of: proctor
      annotations:
        # Prometheus scrapes the POD directly on 8787 via these annotations —
        # that path does not go through the Ingress.
        #
        # WARNING — /metrics IS reachable through the Ingress unless you stop
        # it. An earlier version of this comment claimed otherwise; that was
        # wrong, and a live deployment served /metrics to the open internet
        # with HTTP 200. ingress.yaml routes path `/` with pathType: Prefix,
        # which matches every path, /metrics included. It exposes no secrets or
        # PII, but it does publish the exact version + backend (useful for
        # CVE-matching a target) and account/family/invite totals.
        #
        # Block it at the edge. See deploy/overlays/klarlabs/metrics-block.yaml
        # for a Traefik implementation; on ingress-nginx the equivalent is a
        # location deny on the Ingress:
        #   nginx.ingress.kubernetes.io/server-snippet: |
        #     location /metrics { deny all; return 403; }
        prometheus.io/scrape: "true"
        prometheus.io/port: "8787"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      # The server calls process::exit(1) if it cannot reach PROCTOR_SYNC_PG at
      # startup. Without this gate the app pods lose the race against a cold
      # Postgres and enter CrashLoopBackOff — whose exponential backoff then keeps
      # the API down for minutes AFTER the database is healthy (observed live:
      # every app replica restarted repeatedly on a fresh apply). Blocking here is
      # cheap, keeps the app container's restart count clean, and makes rollouts
      # deterministic.
      #
      # Reuses the same pinned Postgres image as the StatefulSet, so this adds no
      # new image to pull, trust, or keep updated.
      initContainers:
        - name: wait-for-postgres
          image: postgres:16.4-alpine@sha256:5660c2cbfea50c7a9127d17dc4e48543eedd3d7a41a595a2dfa572471e37e64c
          command:
            - sh
            - -c
            - |
              until pg_isready -q -h proctor-postgres -p 5432 -U proctor; do
                echo "waiting for proctor-postgres:5432 ..."
                sleep 2
              done
              echo "postgres is accepting connections"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: proctor-sync-server
          # Parameterize this image ref for your registry / release tag.
          image: ghcr.io/klarlabs-studio/proctor-sync-server:1.41.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: PROCTOR_SYNC_ADDR
              value: "0.0.0.0:8787"
            # The Postgres URL and Stripe secret come from the proctor-sync-secrets
            # Secret (created out-of-band; see deploy/README.md § Secrets).
            - name: PROCTOR_SYNC_PG
              valueFrom:
                secretKeyRef:
                  name: proctor-sync-secrets
                  key: postgres-url
            - name: PROCTOR_SYNC_PG_POOL
              value: "8"
            - name: PROCTOR_STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: proctor-sync-secrets
                  key: stripe-webhook-secret
                  optional: true
            # Device-token lifetime in seconds (0 / unset → never expire). 30 days.
            - name: PROCTOR_SYNC_TOKEN_TTL
              value: "2592000"
            # Per-client-IP rate limit for register + invite mint (0 disables).
            - name: PROCTOR_SYNC_RATELIMIT_PER_MIN
              value: "30"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "500m"
              memory: 256Mi
          # startupProbe covers the boot window so the liveness probe (which
          # RESTARTS the container) is suspended until the server is actually
          # listening. Without it, a slow start races liveness and the pod is
          # killed mid-startup — observed on a live cluster.
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 3
            timeoutSeconds: 5
            # 40 * 3s = up to 2 minutes to come up.
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
            # Timeout raised from 3s: the container is capped at 500m CPU, so under
            # a load spike a healthy server can miss a tight deadline and get
            # needlessly restarted. failureThreshold 5 * 15s = ~75s of sustained
            # unresponsiveness before we conclude the process is wedged.
            timeoutSeconds: 5
            failureThreshold: 5
