apiVersion: apps/v1
kind: Deployment
metadata:
  name: proctor-sync-server
  namespace: proctor
  labels:
    app.kubernetes.io/name: proctor-sync-server
    app.kubernetes.io/part-of: proctor
spec:
  # Stateless: all state lives in PostgreSQL, so the API scales horizontally.
  # Start at 2 for availability; the HPA (hpa.yaml) scales on CPU.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: proctor-sync-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proctor-sync-server
        app.kubernetes.io/part-of: proctor
      annotations:
        # Scraped cluster-internally; /metrics is not exposed via the ingress.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8787"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proctor-sync-server
          # Parameterize this image ref for your registry / release tag.
          image: ghcr.io/klarlabs/proctor-sync-server:1.33.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: PROCTOR_SYNC_ADDR
              value: "0.0.0.0:8787"
            # The Postgres URL and Stripe secret come from the proctor-sync-secrets
            # Secret (created out-of-band; see deploy/README.md § Secrets).
            - name: PROCTOR_SYNC_PG
              valueFrom:
                secretKeyRef:
                  name: proctor-sync-secrets
                  key: postgres-url
            - name: PROCTOR_SYNC_PG_POOL
              value: "8"
            - name: PROCTOR_STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: proctor-sync-secrets
                  key: stripe-webhook-secret
                  optional: true
            # Device-token lifetime in seconds (0 / unset → never expire). 30 days.
            - name: PROCTOR_SYNC_TOKEN_TTL
              value: "2592000"
            # Per-client-IP rate limit for register + invite mint (0 disables).
            - name: PROCTOR_SYNC_RATELIMIT_PER_MIN
              value: "30"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "500m"
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
