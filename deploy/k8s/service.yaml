apiVersion: v1
kind: Service
metadata:
  name: keyward-sync-server
  namespace: keyward
  labels:
    app.kubernetes.io/name: keyward-sync-server
    app.kubernetes.io/part-of: keyward
spec:
  type: ClusterIP
  # Explicit (see the note in deployment.yaml): the kustomize label transformer
  # no longer writes into selectors.
  selector:
    app.kubernetes.io/name: keyward-sync-server
    app.kubernetes.io/part-of: keyward
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
