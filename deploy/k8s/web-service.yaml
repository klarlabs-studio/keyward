apiVersion: v1
kind: Service
metadata:
  name: keyward-web
  namespace: keyward
  labels:
    app.kubernetes.io/name: keyward-web
    app.kubernetes.io/part-of: keyward
spec:
  type: ClusterIP
  # Explicit selector (see the note in web-deployment.yaml): the kustomize label
  # transformer runs with includeSelectors:false and no longer writes into
  # selectors, so both labels are spelled out here.
  selector:
    app.kubernetes.io/name: keyward-web
    app.kubernetes.io/part-of: keyward
  ports:
    - name: http
      # Port 80 on the Service, targeting the container's 8080 by NAME. Matching
      # the sync Service's shape (80 -> named `http`) keeps the Ingress backends
      # uniform, and the name indirection means the container port can move
      # without touching this file or the Ingress.
      port: 80
      targetPort: http
      protocol: TCP
