# Pull-request and main-branch checks.
#
# These are the same three gates the project treats as release-blocking:
# formatting, clippy-as-errors, and the full test suite (Rust + the TypeScript
# trust/round-trip checks). Nothing here publishes anything — see release.yml.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref; a stale PR build gates nothing.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest

    # The Postgres contract tests SKIP SILENTLY when KEYWARD_TEST_PG is unset,
    # and the first version of this workflow did not set it. That is not a
    # missing nice-to-have: Postgres is the backend the managed instance runs,
    # and while CI was green over it, `load_group` read added_epoch from column
    # index 5 — which is `role`, a TEXT column — as i64, panicking on EVERY
    # group load, and `insert_member` bound 8 parameters into VALUES ($1..$7).
    # Family sharing could not work at all on the only backend that ships, and
    # nothing in the suite could say so. A skipped test that reports success is
    # worse than an absent one.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: keyward
          POSTGRES_PASSWORD: keyward
          POSTGRES_DB: keyward_test
        ports:
          - 5432:5432
        # Without this the job races the container and fails on connection
        # refused rather than on anything real.
        options: >-
          --health-cmd "pg_isready -U keyward"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # Pinned to the workspace's rust-version so CI cannot pass on a toolchain
      # newer than the one deploy/Dockerfile compiles the release image with.
      - name: Install Rust 1.90
        run: rustup toolchain install 1.90 --profile minimal --component rustfmt,clippy --no-self-update
      - run: rustup default 1.90

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

      # crates/sync-postgres-queries is GENERATED by Cornucopia from
      # crates/sync-postgres/queries/*.sql, checked against
      # crates/sync-postgres/schema.sql, and COMMITTED so that builds need no
      # database. Committed generated code has one failure mode: someone edits a
      # .sql file (or the schema) and does not regenerate, so the Rust that
      # actually compiles no longer matches the SQL that was reviewed. Nothing
      # would notice — the build stays green against the stale output. That is
      # the same class of silent failure as a contract test that skips and
      # reports success, which is why this is a gate and not a reminder.
      #
      # `fresh` builds a THROWAWAY database on the service container above,
      # applies schema.sql, prepares every query against it, and drops it. So
      # this step also re-proves that every committed query is still valid
      # against the committed schema — a query referencing a column that a
      # schema change removed fails here with exit 1, at review time, instead of
      # panicking on the request path in production.
      - name: Regenerate Cornucopia queries and assert no drift
        env:
          # Server URL WITHOUT a database name: `fresh` creates its own.
          DATABASE_URL: postgres://keyward:keyward@localhost:5432
        run: |
          cargo install cornucopia --version 1.0.0 --locked
          cornucopia fresh -u "$DATABASE_URL" crates/sync-postgres/schema.sql
          if ! git diff --exit-code -- crates/sync-postgres-queries; then
            echo "::error::Generated queries are stale. Run: cornucopia fresh -u postgres://keyward:keyward@localhost:5432 crates/sync-postgres/schema.sql"
            exit 1
          fi

      # Against the real backend. Separate step so a Postgres-specific failure
      # is distinguishable at a glance from a logic failure in the line above.
      - name: Postgres contract tests (real backend)
        env:
          KEYWARD_TEST_PG: postgres://keyward:keyward@localhost:5432/keyward_test
        run: cargo test -p keyward-sync-postgres --features keyward-sync/testkit

      # Guard the guard. The contract tests skip when KEYWARD_TEST_PG is unset,
      # so a typo in the variable name above would restore the exact blind spot
      # this job exists to close — silently, and looking green. Assert the
      # database is genuinely reachable rather than trusting that it was.
      - name: Assert the contract tests did not silently skip
        env:
          KEYWARD_TEST_PG: postgres://keyward:keyward@localhost:5432/keyward_test
        run: |
          out="$(cargo test -p keyward-sync-postgres --features keyward-sync/testkit -- --nocapture 2>&1)"
          echo "$out"
          if echo "$out" | grep -qiE 'skip|KEYWARD_TEST_PG not set'; then
            echo "::error::Postgres contract tests skipped — the real backend was NOT exercised"
            exit 1
          fi
          if ! echo "$out" | grep -qE '^test result: ok\. [1-9]'; then
            echo "::error::Postgres contract tests ran zero tests"
            exit 1
          fi

  web:
    name: Web vault (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Rust 1.90 (wasm32 target)
        run: rustup toolchain install 1.90 --profile minimal --target wasm32-unknown-unknown --no-self-update
      - run: rustup default 1.90

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.15.0'

      - run: npm ci

      # Round-trip and trust-merge checks. Neither imports the WASM bundle, so
      # they run before the (slow) wasm build and fail fast if broken.
      - run: npm test

      # `npm run build` starts with `vue-tsc --noEmit`, and src/lib/passbook.ts
      # and sharing.ts import ../wasm/pkg/passbook_wasm.js. That module is
      # GENERATED, not committed, so type-checking fails with TS2307 unless the
      # bundle is built first. Order matters here.
      - run: npm run build:wasm
      - run: npm run build
