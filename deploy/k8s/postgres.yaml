# Self-contained in-cluster Postgres for a simple deploy. For PRODUCTION prefer a
# managed database (Cloud SQL / RDS) or an operator (CloudNativePG) that gives you
# backups, HA, and point-in-time recovery — point PROCTOR_SYNC_PG at it and delete
# this file from kustomization.yaml.
apiVersion: v1
kind: Service
metadata:
  name: proctor-postgres
  namespace: proctor
  labels:
    app.kubernetes.io/name: proctor-postgres
    app.kubernetes.io/part-of: proctor
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: proctor-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: proctor-postgres
  namespace: proctor
  labels:
    app.kubernetes.io/name: proctor-postgres
    app.kubernetes.io/part-of: proctor
spec:
  serviceName: proctor-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: proctor-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proctor-postgres
        app.kubernetes.io/part-of: proctor
    spec:
      securityContext:
        # The official image runs as the postgres user; fsGroup lets it own the volume.
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16.4-alpine@sha256:5660c2cbfea50c7a9127d17dc4e48543eedd3d7a41a595a2dfa572471e37e64c
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: proctor
            - name: POSTGRES_DB
              value: proctor
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: proctor-sync-secrets
                  key: postgres-password
            # Keep PGDATA in a subdir so the volume's lost+found never clashes with initdb.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          # Probe design note (validated on a live cluster): `pg_isready` is an
          # EXEC probe, so every check forks a process inside the container. Under
          # node CPU pressure that fork+exec alone can exceed a tight timeout — a
          # 3s timeout was observed killing a perfectly healthy Postgres, causing
          # repeated unclean restarts of the database. Probes below are therefore
          # deliberately slack: they exist to catch a *hung* server, not a slow one.
          #
          # `-h /var/run/postgresql` forces the local unix socket so the check can
          # never be affected by network/NetworkPolicy state, and `-q` avoids
          # pointless output.
          #
          # startupProbe covers first boot: initdb creates the cluster on an empty
          # volume and can take far longer than a steady-state check. While the
          # startupProbe is running the liveness probe is suspended, so initdb can
          # never be interrupted mid-write (a real data-corruption risk).
          startupProbe:
            exec:
              command: ["pg_isready", "-q", "-U", "proctor", "-h", "/var/run/postgresql"]
            periodSeconds: 5
            timeoutSeconds: 10
            # 60 * 5s = up to 5 minutes for initdb on a cold volume.
            failureThreshold: 60
          readinessProbe:
            exec:
              command: ["pg_isready", "-q", "-U", "proctor", "-h", "/var/run/postgresql"]
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-q", "-U", "proctor", "-h", "/var/run/postgresql"]
            periodSeconds: 20
            timeoutSeconds: 10
            # 6 * 20s = ~2 min of sustained unresponsiveness before we restart the
            # database. Restarting Postgres is expensive and disruptive; only do it
            # when it is genuinely wedged, never on a transient load spike.
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
