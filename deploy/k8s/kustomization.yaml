apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply the whole set with:  kubectl apply -k deploy/k8s
# (or apply the files individually with kubectl apply -f deploy/k8s/).
namespace: proctor

resources:
  - namespace.yaml
  - postgres.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - networkpolicy.yaml
  - pdb.yaml
# NOTE: no Secret manifest is committed — create the `proctor-sync-secrets`
# Secret out-of-band with `kubectl create secret` (see deploy/README.md § Secrets).

commonLabels:
  app.kubernetes.io/part-of: proctor

# Override the image tag without editing deployment.yaml, e.g.:
#   kubectl kustomize deploy/k8s | kubectl apply -f -
# or set here:
images:
  - name: ghcr.io/klarlabs/proctor-sync-server
    newTag: "1.33.0"
